<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>게시판 테스트</title>
  <style>
    /* 썸네일 / 상세 이미지 살짝만 꾸미기 */
    .thumb {
      width: 80px;
      height: 80px;
      object-fit: cover;
      margin-right: 8px;
      vertical-align: middle;
      border: 1px solid #ccc;
    }

    .detail-img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      margin-right: 8px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
    }

    #postList li {
      margin: 4px 0;
      list-style: none;
    }
  </style>
</head>

<body>
  <h1>게시판 API 테스트</h1>

  <button id="btnLogin">① 테스트 로그인</button>
  <hr>

  <h2>글 작성</h2>
  <input id="title" placeholder="제목" style="width:300px;"><br>
  <textarea id="content" placeholder="내용" rows="4" cols="40"></textarea><br>

  <!-- ✅ 이미지 선택 + 업로드 버튼 + 미리보기 -->
  <input id="imageInput" type="file" accept="image/*" multiple>
  <button id="btnUploadImages">이미지 업로드</button>
  <div id="imagePreview"></div>

  <button id="btnCreate">② 글 작성</button>
  <div id="createResult"></div>

  <hr>
  <h2>글 목록 (썸네일 포함 + 페이징/검색/정렬)</h2>

  <!-- ✅ 페이징/검색/정렬 파라미터 입력 -->
  <div>
    페이지: <input id="page" type="number" value="0" style="width:60px;"> (0부터 시작)
    페이지 크기: <input id="size" type="number" value="10" style="width:60px;">
    <br>
    검색어: <input id="keyword" type="text" style="width:150px;">
    검색 타입:
    <select id="searchType">
      <option value="ALL">전체(제목+내용)</option>
      <option value="TITLE">제목</option>
      <option value="CONTENT">내용</option>
      <option value="USER">작성자</option>
    </select>
    <br>
    정렬 기준:
    <select id="sortBy">
      <option value="postId">postId(기본)</option>
      <option value="createDate">작성일</option>
      <option value="view">조회수</option>
      <option value="title">제목</option>
    </select>
    방향:
    <select id="direction">
      <option value="DESC">DESC</option>
      <option value="ASC">ASC</option>
    </select>

    <button id="btnLoadList">③ 목록 불러오기</button>
  </div>

  <div id="pageInfo"></div>
  <ul id="postList"></ul>

  <hr>
  <h2>글 상세</h2>
  <input id="detailId" placeholder="postId 입력">
  <button id="btnLoadDetail">④ 상세 불러오기</button>

  <!-- 글 수정/삭제 버튼 -->
  <button id="btnUpdate">⑤ 글 수정</button>
  <button id="btnDelete">⑥ 글 삭제</button>

  <h3>상세 JSON</h3>
  <pre id="detailResult"></pre>

  <h3>상세 이미지</h3>
  <div id="detailImages"></div>

  <script>
    const BASE_URL = "http://localhost:8080";

    // ✅ 현재 글에 연결된 이미지 fileId 목록
    let currentFileIds = [];

    /** URL이 절대경로인지 상대경로인지에 따라 src 만들어 주는 헬퍼 */
    function resolveSrc(uri) {
      if (!uri) return null;
      return uri.startsWith("http") ? uri : `${BASE_URL}${uri}`;
    }

    // ① 테스트 로그인 (세션에 LOGIN_USER_ID 넣기)
    document.getElementById("btnLogin").onclick = async () => {
      const res = await fetch(`${BASE_URL}/api/test/login`, {
        credentials: "include"
      });
      const text = await res.text();
      alert(text);
    };

    // ✅ 이미지 업로드
    document.getElementById("btnUploadImages").onclick = async () => {
      const input = document.getElementById("imageInput");
      const files = input.files;

      if (!files || files.length === 0) {
        alert("업로드할 이미지를 선택해 주세요.");
        return;
      }

      const formData = new FormData();
      for (const file of files) {
        formData.append("files", file); // @RequestParam("files") 와 이름 맞추기
      }

      try {
        const res = await fetch(`${BASE_URL}/api/media/upload`, {
          method: "POST",
          credentials: "include",
          body: formData
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || res.statusText);
        }

        const data = await res.json(); // [{fileId, url, thumbUrl}, ...]
        console.log("업로드 결과:", data);

        // ✅ currentFileIds 갱신
        currentFileIds = data.map(d => d.fileId);

        // ✅ 미리보기 썸네일 렌더링
        const preview = document.getElementById("imagePreview");
        preview.innerHTML = "";
        data.forEach(d => {
          const img = document.createElement("img");
          img.className = "thumb";
          img.src = d.thumbUrl || d.url; // 썸네일 없으면 원본
          img.alt = "preview";
          preview.appendChild(img);
        });

        alert("이미지 업로드가 완료되었습니다.");

      } catch (err) {
        console.error(err);
        alert("이미지 업로드 실패: " + err.message);
      }
    };

    // ② 글 작성
    document.getElementById("btnCreate").onclick = async () => {
      const title = document.getElementById("title").value;
      const context = document.getElementById("content").value;

      const res = await fetch(`${BASE_URL}/api/posts`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify({
          title,
          context,
          fileIds: currentFileIds   // ✅ 업로드된 이미지 fileId들 연결
        })
      });

      if (!res.ok) {
        const text = await res.text();
        alert("글 작성 실패: " + text);
        return;
      }

      const data = await res.json();
      document.getElementById("createResult").innerText =
        `생성된 postId = ${data.postId}`;

      // 작성 후 초기화 (원하면 유지해도 됨)
      currentFileIds = [];
      document.getElementById("imageInput").value = "";
      document.getElementById("imagePreview").innerHTML = "";
    };

    // ③ 글 목록 불러오기 + 썸네일 표시 (⚠️ Page 구조 반영)
    document.getElementById("btnLoadList").onclick = async () => {

      const page = parseInt(document.getElementById("page").value || "0", 10);
      const size = parseInt(document.getElementById("size").value || "10", 10);
      const keyword = document.getElementById("keyword").value || "";
      const type = document.getElementById("searchType").value || "ALL";
      const sortBy = document.getElementById("sortBy").value || "postId";
      const direction = document.getElementById("direction").value || "DESC";

      const params = new URLSearchParams();
      params.set("page", page);
      params.set("size", size);
      params.set("sortBy", sortBy);
      params.set("direction", direction);
      params.set("type", type);
      if (keyword.trim() !== "") {
        params.set("keyword", keyword.trim());
      }

      const res = await fetch(`${BASE_URL}/api/posts?` + params.toString(), {
        credentials: "include"
      });

      if (!res.ok) {
        const text = await res.text();
        alert("목록 조회 실패: " + text);
        return;
      }

      const pageData = await res.json();
      console.log("페이지 응답:", pageData);

      const list = pageData.content;
      if (!Array.isArray(list)) {
        alert("목록 데이터 형식이 올바르지 않습니다.");
        return;
      }

      // 페이지 정보 표시
      const pageInfo = document.getElementById("pageInfo");
      pageInfo.innerText =
        `현재 페이지: ${pageData.number} / 전체 페이지: ${pageData.totalPages},  전체 글 수: ${pageData.totalElements}`;

      const ul = document.getElementById("postList");
      ul.innerHTML = "";

      list.forEach(post => {
        const li = document.createElement("li");

        // 썸네일 있으면 <img> 추가
        if (post.thumbnailUri) {
          const img = document.createElement("img");
          img.className = "thumb";
          img.src = resolveSrc(post.thumbnailUri);
          img.alt = "thumbnail";
          li.appendChild(img);
        }

        // 텍스트 정보
        const span = document.createElement("span");
        span.textContent =
          `[${post.postId}] ${post.title} / ${post.userId} / 조회수 ${post.view}`;
        li.appendChild(span);

        ul.appendChild(li);
      });
    };

    // ④ 글 상세 불러오기 + 상세 이미지 표시
    document.getElementById("btnLoadDetail").onclick = async () => {
      const id = document.getElementById("detailId").value.trim();
      if (!id) {
        alert("postId를 입력해 주세요.");
        return;
      }

      const res = await fetch(`${BASE_URL}/api/posts/${id}`, {
        credentials: "include"
      });

      if (!res.ok) {
        const text = await res.text();
        alert("상세 조회 실패: " + text);
        return;
      }

      const data = await res.json();
      document.getElementById("detailResult").innerText =
        JSON.stringify(data, null, 2);

      // 수정 편의용: 제목/내용 입력창에 채우기
      document.getElementById("title").value = data.title ?? "";
      document.getElementById("content").value = data.context ?? "";

      // ✅ 상세 이미지 영역 렌더링
      const imgBox = document.getElementById("detailImages");
      imgBox.innerHTML = "";

      if (Array.isArray(data.images) && data.images.length > 0) {
        data.images.forEach(imgDto => {
          const src = resolveSrc(imgDto.thumbUri || imgDto.storageUri);
          if (!src) return;

          const img = document.createElement("img");
          img.className = "detail-img";
          img.src = src;
          img.alt = "image";
          imgBox.appendChild(img);
        });

        // ✅ 상세 조회 시, 현재 이미지 fileId들로 currentFileIds 세팅
        currentFileIds = data.images
          .map(i => i.fileId)
          .filter(id => typeof id === "number");

      } else {
        imgBox.textContent = "이미지 없음";
        currentFileIds = [];
      }
    };

    // ⑤ 글 수정
    document.getElementById("btnUpdate").onclick = async () => {
      const id = document.getElementById("detailId").value.trim();
      if (!id) {
        alert("수정할 postId를 입력하거나, 먼저 상세를 불러와 주세요.");
        return;
      }

      const title = document.getElementById("title").value.trim();
      const context = document.getElementById("content").value.trim();

      if (!title) {
        alert("제목을 입력해 주세요.");
        return;
      }

      const res = await fetch(`${BASE_URL}/api/posts/${id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify({
          title,
          context,
          fileIds: currentFileIds // ✅ 현재 선택/연결된 이미지들로 수정
        })
      });

      if (!res.ok) {
        const text = await res.text();
        alert("글 수정 실패: " + text);
        return;
      }

      const data = await res.json();
      alert("글이 수정되었습니다.");
      document.getElementById("detailResult").innerText =
        JSON.stringify(data, null, 2);
    };

    // ⑥ 글 삭제
    document.getElementById("btnDelete").onclick = async () => {
      const id = document.getElementById("detailId").value.trim();
      if (!id) {
        alert("삭제할 postId를 입력하거나, 먼저 상세를 불러와 주세요.");
        return;
      }

      if (!confirm(`정말로 글 ${id} 를 삭제할까요?`)) {
        return;
      }

      const res = await fetch(`${BASE_URL}/api/posts/${id}`, {
        method: "DELETE",
        credentials: "include"
      });

      if (!res.ok) {
        const text = await res.text();
        alert("글 삭제 실패: " + text);
        return;
      }

      alert("글이 삭제되었습니다.");

      document.getElementById("detailResult").innerText = "";
      document.getElementById("detailId").value = "";
      document.getElementById("title").value = "";
      document.getElementById("content").value = "";
      document.getElementById("detailImages").innerHTML = "";
      document.getElementById("imagePreview").innerHTML = "";
      document.getElementById("imageInput").value = "";
      currentFileIds = [];
    };
  </script>
</body>

</html>
