spring.application.name=backend

# MariaDB 드라이버 설정
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/springboot?serverTimezone=UTC&characterEncoding=UTF-8
# [주의] 본인의 MariaDB 사용자명과 비밀번호로 반드시 변경해야 합니다.
spring.datasource.username=test
spring.datasource.password=12345

# [중요 수정] none -> update로 변경해야 테이블이 자동 생성됩니다.
# update: 기존 데이터는 유지하면서 스키마 변경사항만 반영
spring.jpa.hibernate.ddl-auto=update

# SQL 로그 확인 (개발 중에는 true 추천)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true